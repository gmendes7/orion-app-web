name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure refs are up to date
        run: git fetch --force --tags --prune
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/python/requirements.txt
      - name: Run tests (if any)
        run: |
          if [ -f backend/python/pyproject.toml ] || [ -d backend/python/tests ]; then
            pytest -q
          else
            echo "No python tests found"
          fi

  node:
    name: Node CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure refs are up to date
        run: git fetch --force --tags --prune
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies (lockfile-aware)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f bun.lockb ]; then
            npm install --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
      - run: npm run lint
      - run: npm run test --if-present -- --run
      - run: npm run build

  node-gateway:
    name: Node Gateway CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/node-integration
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure refs are up to date
        run: git fetch --force --tags --prune
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies (lockfile-aware)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Smoke test
        run: node -e "require('./gateway.js'); console.log('gateway loaded')"

  rust:
    name: Rust Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure refs are up to date
        run: git fetch --force --tags --prune
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "stable"
      - name: Build
        run: |
          cd libs/rust/crypto
          if [ -f Cargo.toml ]; then cargo build --release; else echo "no crate"; fi

  cpp:
    name: C++ Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure refs are up to date
        run: git fetch --force --tags --prune
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libsodium-dev python3-dev python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install pybind11
      - name: Build C++ targets
        run: |
          cd libs/cpp/validation
          cmake -S . -B build -DBUILD_PYBIND11=ON -Dpybind11_DIR="$(python3 -m pybind11 --cmakedir)"
          cmake --build build -- -j"$(nproc)"
      - name: Smoke test artifacts
        run: |
          cd libs/cpp/validation
          test -f build/verify_cli
          ls -la build
          if ls build/libvalidate_c*.so >/dev/null 2>&1; then
            echo "validate_c shared library built"
          else
            echo "shared library not found"
            exit 1
          fi
